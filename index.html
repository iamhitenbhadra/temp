<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arduino IDE Clone</title>
<style>
    /* CSS Reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background: #ececec; }

    /* Layout */
    .ide-container { display: flex; flex-direction: column; height: 100vh; }
    
    /* Toolbar */
    .toolbar { 
        background-color: #00979c; 
        height: 60px; 
        display: flex; 
        align-items: center; 
        padding: 0 15px; 
        position: relative;
    }
    .toolbar-btn {
        width: 30px; height: 30px; 
        border-radius: 50%; 
        border: 2px solid #fff;
        background: transparent; 
        margin-right: 15px; 
        cursor: pointer;
        display: flex; justify-content: center; align-items: center;
        transition: background 0.2s;
    }
    .toolbar-btn:hover { background: rgba(255,255,255,0.2); }
    .toolbar-btn svg { width: 16px; height: 16px; fill: #fff; }
    
    .toolbar-right { margin-left: auto; display: flex; }
    .toolbar-right-btn { 
        background: transparent; border: none; cursor: pointer; 
        display: flex; align-items: center; justify-content: center;
        width: 30px; height: 30px; border-radius: 4px;
    }
    .toolbar-right-btn:hover { background: rgba(255,255,255,0.2); }
    .toolbar-right-btn svg { width: 20px; height: 20px; fill: #fff; }

    /* Main Area */
    .main-area { display: flex; flex: 1; height: calc(100% - 60px - 150px); }

    /* Sidebar Navigation */
    .sidebar { 
        width: 300px; 
        background: #fafafa; 
        border-right: 1px solid #ccc; 
        display: flex; 
        flex-direction: column; 
    }
    .sidebar-header { 
        padding: 12px; background: #e0e0e0; font-weight: 600; 
        border-bottom: 1px solid #ccc; font-size: 14px;
        display: flex; justify-content: space-between; align-items: center;
    }
    .search-box {
        padding: 8px; border-bottom: 1px solid #ccc; background: #fff;
    }
    .search-box input {
        width: 100%; padding: 6px 10px; border: 1px solid #ddd;
        border-radius: 4px; font-size: 13px;
    }
    .program-list { flex: 1; overflow-y: auto; list-style: none; }
    .program-item { 
        padding: 10px 15px; border-bottom: 1px solid #eee; cursor: pointer; 
        font-size: 13px; color: #333; line-height: 1.4;
    }
    .program-item:hover { background: #f0f0f0; }
    .program-item.active { background: #00979c; color: white; font-weight: bold; }
    
    /* Editor Area */
    .editor-wrapper { flex: 1; display: flex; flex-direction: column; background: #fff; min-width: 0; }
    
    /* Tabs */
    .tabs-bar { 
        display: flex; background: #00979c; height: 30px; 
        align-items: flex-end; padding-left: 5px; position: relative;
    }
    .tab {
        background: #ffffff; color: #333; padding: 5px 20px; font-size: 13px;
        border-top-left-radius: 4px; border-top-right-radius: 4px; 
        margin-right: 2px; font-weight: 600; display: flex; align-items: center;
        border: 1px solid #00979c; border-bottom: none; position: relative; top: 1px;
    }
    .tab-actions {
        position: absolute; right: 10px; bottom: 4px; display: flex; gap: 10px;
    }
    .action-btn {
        background: transparent; border: 1px solid rgba(255,255,255,0.5); 
        color: white; border-radius: 3px; padding: 2px 8px; font-size: 11px;
        cursor: pointer; display: flex; align-items: center;
    }
    .action-btn:hover { background: rgba(255,255,255,0.2); }
    .action-btn svg { width: 12px; height: 12px; fill: white; margin-right: 4px; }

    /* Code Editor */
    .editor-container { 
        flex: 1; display: flex; background: #fff; position: relative; 
        overflow: auto; border-top: 1px solid #ccc;
    }
    .gutter {
        padding: 10px 5px; text-align: right; background: #f8f8f8; color: #999;
        font-family: 'Consolas', 'Courier New', monospace; font-size: 14px;
        border-right: 1px solid #ddd; user-select: none; min-width: 45px;
        line-height: 1.5;
    }
    .code-area {
        padding: 10px 15px; flex: 1; font-family: 'Consolas', 'Courier New', monospace;
        font-size: 14px; line-height: 1.5; white-space: pre; outline: none;
        color: #000; overflow-x: auto; tab-size: 4;
    }

    /* Syntax Highlighting Colors */
    .keyword { color: #00979c; font-weight: bold; }
    .function { color: #d35400; }
    .comment { color: #95a5a6; font-style: italic; }
    .string { color: #005c5f; }
    .constant { color: #00979c; }
    .preprocessor { color: #5e6d03; }

    /* Console Area */
    .console-wrapper { height: 150px; display: flex; flex-direction: column; }
    .status-bar { 
        background: #00979c; color: #fff; font-size: 12px; padding: 4px 15px; 
        display: flex; justify-content: space-between;
    }
    .console {
        flex: 1; background: #000; padding: 10px 15px; color: #fff; 
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 13px; overflow-y: auto; white-space: pre-wrap;
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    .console::-webkit-scrollbar-track { background: #222; }
    .console::-webkit-scrollbar-thumb { background: #555; }
</style>
</head>

<div class="ide-container">

        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-area">
        
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                Sketchbook
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search questions..." onkeyup="filterPrograms()">
            </div>
            <ul class="program-list" id="programList">
                <!-- Populated via JS -->
            </ul>
        </div>

        <!-- Editor -->
        <div class="editor-wrapper">
            <div class="tabs-bar">
                <div class="tab" id="activeTabName">firmware.ino</div>
                <div class="tab-actions">
                    <button class="action-btn" onclick="copyCode()">
                        <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy
                    </button>
                    <button class="action-btn" onclick="downloadCode()">
                        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Download
                    </button>
                </div>
            </div>
            <div class="editor-container" id="editorContainer">
                <div class="gutter" id="lineNumbers">1</div>
                <div class="code-area" id="codeArea"></div>
            </div>
        </div>
    </div>

    <!-- Console -->
    <div class="console-wrapper">
        <div class="status-bar">
            <span id="statusMessage">Done compiling.</span>
            <span>Arduino / Genuino Uno on COM5</span>
        </div>
        <div class="console" id="consoleOutput">Sketch uses 31212 bytes (5%) of program storage space. Maximum is 524288 bytes.<br>Global variables use 1204 bytes (14%) of dynamic memory.</div>
    </div>

</div>

    let currentProgram = null;

    // --- Highlighting Logic ---
    function highlightCode(code, lang) {
        if (lang === 'cpp') {
            return code
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/(#\w+.*)/g, '<span class="preprocessor">$1</span>') // Preprocessor
                .replace(/(".*?")/g, '<span class="string">$1</span>') // Strings
                .replace(/(\/\/.*)/g, '<span class="comment">$1</span>') // Comments
                .replace(/\b(void|int|char|float|if|else|while|for|true|false)\b/g, '<span class="keyword">$1</span>') // Keywords
                .replace(/\b(setup|loop|pinMode|digitalWrite|digitalRead|analogRead|Serial|begin|print|println|delay|lcd|init|backlight|setCursor|Blynk|virtualWrite|read|available)\b/g, '<span class="function">$1</span>') // Functions
                .replace(/\b(HIGH|LOW|INPUT|OUTPUT)\b/g, '<span class="constant">$1</span>'); // Constants
        } else {
            return code
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/('.*?')/g, '<span class="string">$1</span>') // Strings single
                .replace(/(".*?")/g, '<span class="string">$1</span>') // Strings double
                .replace(/(\%.*)/g, '<span class="comment">$1</span>') // Comments
                .replace(/\b(clear|all|while|true|if|else|end|for|clc)\b/g, '<span class="keyword">$1</span>') // Keywords
                .replace(/\b(arduino|readDigitalPin|fprintf|pause|configurePin|writeDigitalPin|readVoltage)\b/g, '<span class="function">$1</span>'); // Functions
        }
    }

    // --- UI Update ---
    function loadProgram(index) {
        const prog = programs[index];
        currentProgram = prog;
        
        // Update sidebar active state
        document.querySelectorAll('.program-item').forEach(el => el.classList.remove('active'));
        document.getElementById('prog-' + index).classList.add('active');

        // Update tab name
        document.getElementById('activeTabName').innerText = "sketch_" + prog.id + prog.ext;

        // Update code area
        const highlighted = highlightCode(prog.code, prog.lang);
        document.getElementById('codeArea').innerHTML = highlighted;

        // Generate line numbers
        const linesCount = prog.code.split('\\n').length;
        let linesHTML = '';
        for (let i = 1; i <= linesCount; i++) linesHTML += i + '<br>';
        document.getElementById('lineNumbers').innerHTML = linesHTML;
        
        // Update Console
        document.getElementById('statusMessage').innerText = "Done loading.";
        document.getElementById('consoleOutput').innerHTML = "Loaded " + prog.title + "<br>Ready.";
    }

    // --- Initialization ---
    function init() {
        const list = document.getElementById('programList');
        programs.forEach((prog, index) => {
            const li = document.createElement('li');
            li.className = 'program-item';
            li.id = 'prog-' + index;
            li.innerText = prog.title;
            li.onclick = () => loadProgram(index);
            list.appendChild(li);
        });
        
        // Load first program by default
        if(programs.length > 0) loadProgram(0);
        
        // Sync scrolling of line numbers
        document.getElementById('editorContainer').addEventListener('scroll', function() {
           // Line numbers scroll handled by flex layout naturally in this structure
        });
    }

    // --- Search Filter ---
    function filterPrograms() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        programs.forEach((prog, index) => {
            const li = document.getElementById('prog-' + index);
            if (prog.title.toLowerCase().includes(query)) {
                li.style.display = "block";
            } else {
                li.style.display = "none";
            }
        });
    }

    // --- Actions ---
    function copyCode() {
        if (!currentProgram) return;
        navigator.clipboard.writeText(currentProgram.code).then(() => {
            const btn = document.querySelector('.action-btn');
            const original = btn.innerHTML;
            btn.innerHTML = 'Copied!';
            document.getElementById('statusMessage').innerText = "Code copied to clipboard.";
            setTimeout(() => btn.innerHTML = original, 2000);
        });
    }

    function downloadCode() {
        if (!currentProgram) return;
        const blob = new Blob([currentProgram.code], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "sketch_" + currentProgram.id + currentProgram.ext;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        document.getElementById('statusMessage').innerText = "File downloaded.";
    }

    // Start
    window.onload = init;
</script>
